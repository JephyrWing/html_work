<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/orders.css" />
    <title>레드향 주문하기</title>
  </head>
  <body>
    <!-- 서버에 데이터 전송 시 form에 기록 후 전송한다. -->
    <form>
      <fieldset>
        <legend><b>상품 선택</b></legend>

        <p><b>주문할 상품을 선택해 주세요.</b></p>
        <ul>
          <li>
            <label>
              <input type="checkbox" />
              선물용 3kg
            </label>
            <label>
              <input type="number" min="0" max="5"/>
              개 (최대 5개)
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" />
              선물용 5kg
            </label>
            <label>
              <input type="number" min="0" max="3"/>
              개 (최대 3개)
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" />
              가정용 3kg
            </label>
            <label>
              <input type="number" min="0" max="5"/>
              개 (최대 5개)
            </label>
          </li>
          <li>
            <label>
              <input type="checkbox" />
              가정용 5kg
            </label>
            <label>
              <input type="number" min="0" max="3"/>
              개 (최대 3개)
            </label>
          </li>
        </ul>
        <p><b>포장 선택</b></p>
        <ul>
          <li>
              <!-- class : 태그 여러개 공용가능 -->
              <!-- id : 태그 당 한개 -->
              <!-- name : 태그 여러개 공용 -> 서버로 전송되는 이름 -->
            <input type="radio" name="gift" id="pakage yes"/>
            <label for="pakage yes">  
              선물 포장
            </label>
          </li>
          <li>
            <input type="radio" name="gift" id="pakage no"/>
            <label for="pakage no">
              선물 포장 안함
            </label>
          </li>
        </ul>
      </fieldset>

      <fieldset>
        <legend><b>배송 정보</b></legend>
        <ul>
          <li>
            <label for="name">이름</label>
            <input type="text" name="name">
          </li>
          <li>
            <label for="address">배송 주소</label>
            <input type="text" name="address">
          </li>
          <li>
            <label for="email">메일 주소</label>
            <input type="email" name="email">
          </li>
          <li>
            <label for="phone">연락처</label>
            <input type="tel" name="phone">
          </li>
          <li>
            <label for="date">배송 지정</label>
            <input type="date" name="date">
          </li>
          <li>
            <label for="memo">메오</label>
            <textarea name="memo" rows="4" cols="40"></textarea>
          </li>
        </ul>
      </fieldset>
      <div class="buttons">
        <input type="submit" value="주문하기">
        <input type="reset" value="취소하기">
      </div>
    </form>
  </body>
</html>
